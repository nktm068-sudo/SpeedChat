<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SpeedChat | Быстро и надёжно</title
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="icon" type="image/png" href="icom.png">
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #auth { position: fixed; width: 100%; height: 100%; background: #0e1621; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .card { background: #17212b; padding: 30px; border-radius: 10px; text-align: center; }
        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #080e15; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        input { background: #242f3d; color: white; border: none; padding: 12px; border-radius: 5px; margin: 5px; }
        button { background: #5288c1; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth">
    <div class="card">
        <h2>SpeedChat</h2>
        <input type="text" id="myIdInput" placeholder="Твой @id">
        <button onclick="login()">ВОЙТИ</button>
    </div>
</div>

<div class="sidebar">
    <div style="padding:20px;">
        <input type="text" id="searchId" placeholder="Поиск @id" style="width:80%;">
        <button onclick="addContact()">+</button>
    </div>
    <div id="contacts"></div>
</div>

<div class="chat">
    <div id="messages"></div>
    <div style="padding:20px; background:#17212b; display:flex;">
        <input type="text" id="msg" style="flex:1;" placeholder="Сообщение...">
        <button onclick="send()">📤</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = "";
    let currentChat = "";

    function login() {
        myId = document.getElementById('myIdInput').value.trim().toLowerCase();
        if(myId) {
            document.getElementById('auth').style.display = 'none';
            loadContacts();
        }
    }

    function addContact() {
        let target = document.getElementById('searchId').value.trim().toLowerCase();
        if(target) db.ref('users/' + myId + '/contacts/' + target).set(true);
    }

    function loadContacts() {
        db.ref('users/' + myId + '/contacts').on('value', s => {
            document.getElementById('contacts').innerHTML = '';
            s.forEach(c => {
                let id = c.key;
                let btn = document.createElement('div');
                btn.innerHTML = "👤 @" + id;
                btn.style.padding = "15px";
                btn.style.cursor = "pointer";
                btn.onclick = () => startChat(id);
                document.getElementById('contacts').appendChild(btn);
            });
        });
    }

    function startChat(id) {
        currentChat = id;
        document.getElementById('messages').innerHTML = '';
        let chatID = myId < id ? myId + "_" + id : id + "_" + myId;
        db.ref('chats/' + chatID).off();
        db.ref('chats/' + chatID).on('child_added', s => {
            let d = s.val();
            let m = document.createElement('div');
            m.innerText = d.user + ": " + d.text;
            m.style.background = d.user === myId ? "#2b5278" : "#182533";
            m.style.margin = "5px";
            m.style.padding = "10px";
            m.style.borderRadius = "10px";
            document.getElementById('messages').appendChild(m);
        });
    }

    function send() {
        let t = document.getElementById('msg').value;
        if(t && currentChat) {
            let chatID = myId < currentChat ? myId + "_" + currentChat : currentChat + "_" + myId;
            db.ref('chats/' + chatID).push({ user: myId, text: t });
            document.getElementById('msg').value = '';
        }
    }
</script>
</body>
</html>
