<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedChat | Быстрый мессенджер</title>
    <!-- ПОДКЛЮЧЕНИЕ МОЗГОВ -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="icon" type="image/png" href="icom.png">
    
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; width: 100%; height: 100%; background: #0e1621; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #17212b; padding: 25px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .auth-card::before { content: ""; display: block; width: 70px; height: 70px; margin: 0 auto 15px; background: url('icom.png') no-repeat center/contain; }
        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #080e15; display: flex; flex-direction: column; flex-shrink: 0; transition: 0.3s; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0e1621; transition: 0.3s; position: relative; }
        #chat-header { background: #17212b; padding: 15px; font-weight: bold; color: #5288c1; display: flex; align-items: center; border-bottom: 1px solid #080e15; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { background: #182533; padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; }
        .my-msg { align-self: flex-end; background: #2b5278; }
        input { width: 90%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: #242f3d; color: white; outline: none; }
        button { border: none; border-radius: 8px; background: #5288c1; color: white; font-weight: bold; cursor: pointer; padding: 12px; }

        /* АДАПТАЦИЯ ПОД REDMI */
        @media (max-width: 650px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            .main-chat { width: 100%; position: absolute; left: 100%; height: 100%; z-index: 20; }
            body.is-chatting .main-chat { left: 0; }
            #back-btn { display: block !important; margin-right: 10px; }
        }
    </style>
</head>
<body id="app-body">

<div id="auth-screen">
    <form class="auth-card" onsubmit="register(event)">
        <h2 style="color:#5288c1"></h2>
        <input type="text" id="reg-id" placeholder="Твой @id" required>
        <input type="email" id="reg-email" placeholder="Email для защиты" required>
        <input type="password" id="reg-pass" placeholder="Пароль" required>
        <button type="submit" style="width:100%">ВОЙТИ / РЕГА</button>
        <!-- ТА САМАЯ КНОПКА -->
        <p onclick="requestReset()" style="color:#5288c1; font-size:12px; cursor:pointer; margin-top:15px;">Забыл пароль?</p>
    </form>
</div>

<div id="app-content" style="display:none; width: 100%; display: flex;">
    <div class="sidebar">
        <div class="search-area" style="padding: 15px; border-bottom: 1px solid #080e15;">
            <input type="text" id="searchInput" placeholder="Поиск @id..." style="width: 85%;">
            <button onclick="searchAndAdd()" style="width:100%; margin-top:5px;">НАЙТИ</button>
        </div>
        <div id="contacts-list"></div>
    </div>
    <div class="main-chat">
        <div id="chat-header">
            <button id="back-btn" onclick="closeChat()" style="display:none; background:none; color:#5288c1; font-size:20px;">⬅</button>
            <span id="chat-title">ВЫБЕРИТЕ ЧАТ</span>
        </div>
        <div id="messages"></div>
        <div class="input-area" style="background:#17212b; padding:15px; display:flex;">
            <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1;">
            <button onclick="sendMessage()" style="background:none; font-size:22px; margin-left:10px;">📤</button>
        </div>
    </div>
</div>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ (ТВОИ ДАННЫЕ) ---
    const firebaseConfig = { databaseURL: "https://speedchat-3412e-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ТВОЙ PUBLIC KEY
    emailjs.init("WncGO1Whdy5mQCX_A");
    const SERVICE_ID = "service_ojghc6o";
    const TEMPLATE_ID = "__ejs-test-mail-service__";

    let currentChat = null, myId = "";

    window.onload = () => {
        const saved = localStorage.getItem('ldf_active_id');
        if (saved) { myId = saved; loginSuccess(); }
        document.getElementById('msgInput').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
    };

    function register(e) {
        e.preventDefault();
        myId = document.getElementById('reg-id').value.toLowerCase().replace('@','').trim();
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        if(myId && pass) {
            db.ref('users/' + myId).set({ pass, email });
            localStorage.setItem('ldf_active_id', myId);
            loginSuccess();
        }
    }

    function loginSuccess() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadContacts();
    }

    function searchAndAdd() {
        let q = document.getElementById('searchInput').value.trim().toLowerCase().replace('@','');
        if(q && q !== myId) {
            db.ref('users/' + q).once('value', s => {
                if(s.exists()) db.ref('users/' + myId + '/contacts/' + q).set(true);
                else alert("Агент не найден!");
            });
        }
    }

    function loadContacts() {
        db.ref('users/' + myId + '/contacts').on('value', snap => {
            document.getElementById('contacts-list').innerHTML = '';
            snap.forEach(c => {
                const id = c.key;
                const html = `<div class="chat-item" onclick="switchChat('${id}', this, '@${id}')">👤 @${id}</div>`;
                document.getElementById('contacts-list').insertAdjacentHTML('afterbegin', html);
            });
        });
    }

    function switchChat(id, el, name) {
        currentChat = id;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('app-body').classList.add('is-chatting');
        document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('messages').innerHTML = '';
        loadMessages();
    }

    function closeChat() { document.getElementById('app-body').classList.remove('is-chatting'); }

    function sendMessage() {
        const i = document.getElementById('msgInput');
        if(i.value.trim() && currentChat) {
            const chatID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
            db.ref('chats/' + chatID).push({ user: myId, text: i.value.trim() });
            i.value = '';
        }
    }

    function loadMessages() {
        if(!currentChat) return;
        const chatID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
        db.ref('chats/' + chatID).off();
        db.ref('chats/' + chatID).on('child_added', s => {
            const d = s.val();
            const m = document.createElement('div');
            m.className = d.user === myId ? 'msg my-msg' : 'msg';
            m.innerHTML = `<b style="color:#5288c1; font-size:10px">${d.user}</b><br>${d.text}`;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }

    // СИСТЕМА ВОССТАНОВЛЕНИЯ (6 ЦИФР)
    function requestReset() {
        const email = prompt("Введи свою почту:");
        if(!email) return;
        db.ref('users').once('value', snapshot => {
            let uKey = null;
            snapshot.forEach(u => { if(u.val().email === email) uKey = u.key; });
            if(uKey) {
                const code = Math.floor(100000 + Math.random() * 900000);
                db.ref('reset_codes/' + uKey).set({ code, exp: Date.now() + 3600000 });
                emailjs.send(SERVICE_ID, TEMPLATE_ID, { secret_code: code, to_email: email })
                .then(() => {
                    const input = prompt("Код отправлен! Введи 6 цифр из письма:");
                    verifyReset(uKey, input);
                });
            } else alert("Почта не найдена!");
        });
    }

    function verifyReset(k, c) {
        db.ref('reset_codes/' + k).once('value', s => {
            const d = s.val();
            if(d && d.code == c && Date.now() < d.exp) {
                const p = prompt("Код верный! Придумай новый пароль:");
                if(p) { db.ref('users/' + k + '/pass').set(p); alert("Пароль изменён!"); }
            } else alert("Ошибка! Неверный код или время вышло.");
        });
    }
</script>
</body>
</html>
