<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpeedChat | Быстро и надёжно</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link rel="icon" type="image/png" href="icom.png">
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; width: 100%; height: 100%; background: #0e1621; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #17212b; padding: 25px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .auth-card::before { content: ""; display: block; width: 70px; height: 70px; margin: 0 auto 15px; background: url('icom.png') no-repeat center/contain; }
        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #080e15; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0e1621; position: relative; }
        #chat-header { background: #17212b; padding: 15px; font-weight: bold; color: #5288c1; border-bottom: 1px solid #080e15; display: flex; align-items: center; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { background: #182533; padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; }
        .my-msg { align-self: flex-end; background: #2b5278; }
        input { width: 90%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: #242f3d; color: white; outline: none; }
        button { border: none; border-radius: 8px; background: #5288c1; color: white; font-weight: bold; cursor: pointer; padding: 12px; }
        @media (max-width: 650px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            .main-chat { width: 100%; position: absolute; left: 100%; height: 100%; z-index: 20; transition: 0.3s; }
            body.chat-active .main-chat { left: 0; }
            #back-btn { display: block !important; margin-right: 10px; }
        }
    </style>
</head>
<body id="app-body">

<div id="auth-screen">
    <form class="auth-card" onsubmit="handleAuth(event)">
        <h2 style="color:#5288c1">Speedchat</h2>
        <p style="font-size: 11px; color: #5288c1; margin-top: -10px;">Быстро и надёжно</p>
        <input type="text" id="reg-name" placeholder="Твоё Имя" required>
        <input type="password" id="reg-pass" placeholder="Пароль" required>
        <button type="submit" style="width:100%">ВОЙТИ / РЕГА</button>
    </form>
</div>

<div id="app-content" style="display:none; width: 100%; display: flex;">
    <div class="sidebar">
        <div class="search-area" style="padding: 15px; border-bottom: 1px solid #080e15;">
            <input type="text" id="searchInput" placeholder="Поиск @id...">
            <button onclick="searchAndAdd()" style="width:100%; margin-top:5px;">НАЙТИ</button>
        </div>
        <div id="contacts-list"></div>
    </div>
    <div class="main-chat">
        <div id="chat-header">
            <button id="back-btn" onclick="closeChat()" style="display:none; background:none; color:#5288c1; font-size:20px;">⬅</button>
            <span id="chat-title">ВЫБЕРИТЕ ЧАТ</span>
        </div>
        <div id="messages"></div>
        <div class="input-area" style="background:#17212b; padding:15px; display:flex;">
            <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1;">
            <button onclick="sendMessage()" style="background:none; color:#5288c1; margin-left:10px; font-size:22px;">📤</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentChat = null, myId = "", myName = "";

    window.onload = () => {
        const savedId = localStorage.getItem('ldf_active_id');
        if (savedId) {
            myId = savedId;
            db.ref('users/' + myId + '/name').once('value', s => {
                myName = s.val() || myId;
                loginSuccess();
            });
        }
        if (Notification.permission !== "granted") Notification.requestPermission();
        document.getElementById('msgInput').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
    };

    async function handleAuth(e) {
        e.preventDefault();
        const nameInput = document.getElementById('reg-name').value.trim();
        const passInput = document.getElementById('reg-pass').value;

        // Генерация ID
        let baseId = translit(nameInput).toLowerCase().replace(/\s+/g, '');
        let finalId = baseId;
        
        let isTaken = true;
        while (isTaken) {
            const s = await db.ref('users/' + finalId).once('value');
            if (s.exists()) {
                if (s.val().pass === passInput) { // Если пароль совпал - это старый юзер
                    finalId = s.key;
                    isTaken = false;
                } else { // Если пароль другой - имя занято, добавляем цифры
                    finalId = baseId + Math.floor(1000 + Math.random() * 9000);
                }
            } else {
                isTaken = false;
            }
        }

        myId = finalId;
        myName = nameInput;
        db.ref('users/' + myId).update({ name: myName, pass: passInput });
        localStorage.setItem('ldf_active_id', myId);
        alert("Твой уникальный ID: @" + myId);
        loginSuccess();
    }

    function translit(word) {
        const converter = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'c','ч':'ch','ш':'sh','щ':'sch','ь':'','ы':'y','ъ':'','э':'e','ю':'yu','я':'ya'};
        return word.split('').map(c => converter[c] || c).join('');
    }

    function loginSuccess() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        loadContacts();
    }

    function searchAndAdd() {
        let q = document.getElementById('searchInput').value.trim().toLowerCase().replace('@','');
        if(q && q !== myId) {
            db.ref('users/' + q).once('value', s => {
                if(s.exists()) {
                    db.ref('users/' + myId + '/contacts/' + q).set(true);
                    document.getElementById('searchInput').value = '';
                } else alert("Агент не найден!");
            });
        }
    }

    function loadContacts() {
        db.ref('users/' + myId + '/contacts').on('value', snap => {
            document.getElementById('contacts-list').innerHTML = '';
            addUI(myId, myName + ' (Заметки)');
            snap.forEach(c => {
                const id = c.key;
                if (id !== myId) {
                    db.ref('users/' + id + '/name').once('value', s => {
                        addUI(id, (s.val() || id) + ' (@' + id + ')');
                    });
                }
            });
        });
    }

    function addUI(id, displayName) {
        const html = `<div class="chat-item" onclick="switchChat('${id}', this, '${displayName}')">👤 ${displayName}</div>`;
        document.getElementById('contacts-list').insertAdjacentHTML('afterbegin', html);
    }

    function switchChat(id, el, name) {
        currentChat = id;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('app-body').classList.add('chat-active');
        document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('messages').innerHTML = '';
        loadMessages();
    }

    function closeChat() { document.getElementById('app-body').classList.remove('chat-active'); }

    function sendMessage() {
        const i = document.getElementById('msgInput');
        if(i.value.trim() && currentChat) {
            const chatID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
            db.ref('chats/' + chatID).push({ user: myId, text: i.value.trim() });
            i.value = '';
        }
    }

    function loadMessages() {
        if(!currentChat) return;
        const chatID = myId < currentChat ? myId+'_'+currentChat : currentChat+'_'+myId;
        db.ref('chats/' + chatID).off();
        db.ref('chats/' + chatID).on('child_added', s => {
            const d = s.val();
            if (d.user !== myId && document.hidden) {
                new Notification("Speedchat", { body: d.text, icon: "icom.png" });
            }
            const m = document.createElement('div');
            m.className = d.user === myId ? 'msg my-msg' : 'msg';
            m.innerHTML = d.text;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }
</script>
</body>
</html>
