<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEED CHAT | ЛДФЛДФ</title>
    <script src="https://gstatic.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="icon" type="image/png" href="icom.png">
    
    <style>
        /* 1. БАЗОВЫЙ СТИЛЬ */
        body { background: #0e1621; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #auth-screen { position: fixed; width: 100%; height: 100%; background: #0e1621; z-index: 100; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: #17212b; padding: 30px; border-radius: 10px; width: 320px; text-align: center; }
        .auth-card::before { content: ""; display: block; width: 80px; height: 80px; margin: 0 auto 15px; background: url('icom.png') no-repeat center/contain; }

        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #080e15; display: flex; flex-direction: column; transition: 0.3s; flex-shrink: 0; }
        .search-area { padding: 15px; border-bottom: 1px solid #080e15; text-align: center; }
        #contacts-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #0e1621; display: flex; align-items: center; }
        .chat-item:hover { background: #242f3d; }
        .chat-item.active { background: #2b5278; }

        .main-chat { flex: 1; display: flex; flex-direction: column; background: url('https://githubusercontent.com'); transition: 0.3s; }
        #chat-header { background: #17212b; padding: 15px; font-weight: bold; border-bottom: 1px solid #080e15; color: #5288c1; display: flex; align-items: center; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { background: #182533; padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 75%; align-self: flex-start; }
        .my-msg { align-self: flex-end; background: #2b5278; }
        
        input { width: 90%; padding: 12px; margin: 8px 0; border: none; border-radius: 5px; background: #242f3d; color: white; outline: none; }
        button { border: none; border-radius: 5px; background: #5288c1; color: white; font-weight: bold; cursor: pointer; padding: 10px; }
        
        /* 2. АДАПТИВНОСТЬ ПОД ТЕЛЕФОН */
        @media (max-width: 600px) {
            .sidebar { width: 100%; }
            .main-chat { position: fixed; left: 100%; top: 0; width: 100%; height: 100%; z-index: 50; }
            body.chat-active .main-chat { left: 0; }
            #back-btn { display: block !important; margin-right: 15px; }
        }
    </style>
</head>
<body id="main-body">

<div id="auth-screen">
    <form class="auth-card" onsubmit="register(event)">
        <h2 style="color:#5288c1">SPEED CHAT v2.5</h2>
        <input type="text" id="reg-id" name="username" placeholder="Твой @id" autocomplete="username" required>
        <input type="password" id="reg-pass" name="password" placeholder="Пароль" autocomplete="current-password" required>
        <button type="submit" style="width:100%">ВОЙТИ</button>
    </form>
</div>

<div id="app" style="display:none; width: 100%; height: 100vh; display: flex;">
    <div class="sidebar">
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Поиск @id...">
            <div style="display:flex; justify-content: space-around; margin-top:5px;">
                <button onclick="searchAndAdd()" style="width:45%; font-size:11px;">ПОИСК</button>
                <button onclick="createGroup()" style="width:45%; font-size:11px; background:#2b5278;">ГРУППА</button>
            </div>
        </div>
        <div id="contacts-list"></div>
    </div>
    <div class="main-chat">
        <div id="chat-header">
            <button id="back-btn" onclick="closeChat()" style="display:none; background:none; color:#5288c1; font-size:20px;">⬅</button>
            <span id="header-title">ВЫБЕРИТЕ ЧАТ</span>
        </div>
        <div id="messages"></div>
        <div class="input-area" style="background: #17212b; padding: 15px; display: flex;">
            <input type="text" id="msgInput" placeholder="Сообщение..." style="flex:1;">
            <button onclick="sendMessage()" style="background:none; color:#5288c1; margin-left:10px;">📤</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentChat = null, myId = "";

    window.onload = function() {
        const savedID = localStorage.getItem('ldf_active_id');
        if (savedID) { myId = savedID; loginSuccess(); }
        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchAndAdd(); });
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    };

    function register(e) {
        if(e) e.preventDefault();
        myId = document.getElementById('reg-id').value.toLowerCase().replace('@', '').trim();
        const pass = document.getElementById('reg-pass').value;
        if (myId && pass) {
            db.ref('users/' + myId + '/pass').set(pass);
            localStorage.setItem('ldf_active_id', myId);
            loginSuccess();
        }
    }

    function loginSuccess() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadContacts();
    }

    function searchAndAdd() {
        let q = document.getElementById('searchInput').value.trim().toLowerCase().replace('@', '');
        if (!q || q === myId) return;
        db.ref('users/' + q).once('value', s => {
            if (s.exists()) db.ref('users/' + myId + '/contacts/' + q).set(true);
            else alert("Агент не найден!");
        });
    }

    function createGroup() {
        const gName = prompt("Имя группы:");
        if (gName) {
            const gID = 'group_' + Date.now();
            db.ref('chats/' + gID + '/metadata').set({ name: gName, creator: myId });
            db.ref('users/' + myId + '/contacts/' + gID).set(true);
        }
    }

    function loadContacts() {
        db.ref('users/' + myId + '/contacts').on('value', snap => {
            document.getElementById('contacts-list').innerHTML = '';
            snap.forEach(c => {
                const id = c.key;
                if (id.startsWith('group_')) db.ref('chats/' + id + '/metadata/name').once('value', s => addUI(id, 'group', s.val()));
                else addUI(id, 'private');
            });
        });
    }

    function addUI(id, type, name = null) {
        const dName = name || '@' + id;
        const html = `<div class="chat-item" onclick="switchChat('${id}', this, '${dName}')">
            ${type === 'group' ? '👥' : '👤'} ${dName}</div>`;
        document.getElementById('contacts-list').insertAdjacentHTML('afterbegin', html);
    }

    function switchChat(id, el, name) {
        currentChat = id;
        document.getElementById('header-title').innerText = name;
        document.body.classList.add('chat-active'); // Мобильный переход
        document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('messages').innerHTML = '';
        loadMessages();
    }

    function closeChat() { document.body.classList.remove('chat-active'); }

    function sendMessage() {
        const i = document.getElementById('msgInput');
        if (i.value.trim() && currentChat) {
            db.ref('chats/' + currentChat + '/messages').push({ user: myId, text: i.value.trim() });
            i.value = '';
        }
    }

    function loadMessages() {
        if (!currentChat) return;
        const ref = db.ref('chats/' + currentChat + '/messages');
        ref.off();
        ref.on('child_added', s => {
            const d = s.val();
            const m = document.createElement('div');
            m.className = d.user === myId ? 'msg my-msg' : 'msg';
            m.innerHTML = `<b style="color:#5288c1; font-size:10px">${d.user}</b><br>${d.text}`;
            document.getElementById('messages').appendChild(m);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
    }
</script>
</body>
</html>
