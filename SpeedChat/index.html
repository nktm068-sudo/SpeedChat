<div class="tg-container" id="auth-box">
    <div id="reg-form">
        <h2>РЕГИСТРАЦИЯ SPEED CHAT</h2>
        <input type="text" id="reg-name" placeholder="Твое Имя">
        <input type="email" id="reg-email" placeholder="Электронная почта">
        <input type="tel" id="reg-phone" placeholder="Номер телефона (для контактов)">
        <input type="password" id="reg-pass" placeholder="Придумай пароль">
        <button onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>
    
    <div id="login-form" style="display:none;">
        <h2>ВХОД</h2>
        <input type="email" id="login-email" placeholder="Почта">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button onclick="login()">ВОЙТИ</button>
    </div>
</div>

<div id="chat-window" style="display:none; width: 100%; height: 100vh;">
    <iframe src="https://smartchatfree.com" width="100%" height="100%" frameborder="0"></iframe>
</div>
